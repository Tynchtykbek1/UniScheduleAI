{% extends "base.html" %}

{% block title %}AI Assistant - UniSchedule AI{% endblock %}

{% block content %}
<h1 class="h3 mb-4">AI Assistant</h1>
<div class="card shadow-sm">
    <div class="card-body">
        <div id="chatMessages" class="border rounded p-3 mb-3 bg-white" style="min-height: 260px;">
            {% for message in messages %}
                <div class="mb-3">
                    <div class="fw-semibold">You</div>
                    <div>{{ message.question }}</div>
                </div>
                <div class="mb-3">
                    <div class="fw-semibold">AI Assistant</div>
                    <div>{{ message.answer }}</div>
                </div>
            {% endfor %}
        </div>
        <form id="chatForm">
            <div class="mb-3">
                <label class="form-label" for="message">Message</label>
                <textarea class="form-control" id="message" rows="3" required></textarea>
            </div>
            <button class="btn btn-primary" type="submit">Send</button>
        </form>
    </div>
</div>

<script>
function appendChatMessage(author, text) {
    const messages = document.getElementById("chatMessages");
    const wrapper = document.createElement("div");
    const heading = document.createElement("div");
    const body = document.createElement("div");

    wrapper.className = "mb-3";
    heading.className = "fw-semibold";
    heading.textContent = author;
    body.textContent = text;

    wrapper.appendChild(heading);
    wrapper.appendChild(body);
    messages.appendChild(wrapper);
}

document.getElementById("chatForm").addEventListener("submit", async function (event) {
    event.preventDefault();

    const input = document.getElementById("message");
    const text = input.value.trim();

    if (!text) {
        return;
    }

    appendChatMessage("You", text);
    input.value = "";

    try {
        const response = await fetch("{{ url_for('ai_chat.api_chat') }}", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({message: text})
        });
        const data = await response.json();
        const reply = data.reply || data.error || "No response received.";
        appendChatMessage("AI Assistant", reply);
    } catch (error) {
        appendChatMessage("AI Assistant", "Sorry, something went wrong.");
    }
});
</script>
{% endblock %}
