{% extends "base.html" %}

{% block title %}Professors - UniSchedule AI{% endblock %}

{% block content %}
<h1 class="h3 mb-4">Professors</h1>
<form class="row g-2 mb-4" method="post" action="{{ url_for('admin.add_professor') }}">
    <div class="col-md-5"><input class="form-control" name="name" placeholder="Professor name" required></div>
    <div class="col-md-5"><input class="form-control" name="email" type="email" placeholder="Email"></div>
    <div class="col-md-2"><button class="btn btn-primary w-100" type="submit">Add</button></div>
</form>

<div class="table-responsive">
    <table class="table table-striped align-middle">
        <thead><tr><th>Name</th><th>Email</th><th>Actions</th></tr></thead>
        <tbody>
            {% for professor in professors %}
                <tr>
                    <form method="post" action="{{ url_for('admin.edit_professor', id=professor.id) }}">
                        <td><input class="form-control" name="name" value="{{ professor.name }}" required></td>
                        <td><input class="form-control" name="email" type="email" value="{{ professor.email or '' }}"></td>
                        <td class="d-flex gap-2">
                            <button class="btn btn-sm btn-outline-primary" type="submit">Save</button>
                    </form>
                            <form method="post" action="{{ url_for('admin.delete_professor', id=professor.id) }}">
                                <button class="btn btn-sm btn-outline-danger" type="submit">Delete</button>
                            </form>
                        </td>
                </tr>
            {% else %}
                <tr><td colspan="3" class="text-muted">No professors found.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
