{% extends "base.html" %}

{% block title %}Rooms - UniSchedule AI{% endblock %}

{% block content %}
<h1 class="h3 mb-4">Rooms</h1>
<form class="row g-2 mb-4" method="post" action="{{ url_for('admin.add_room') }}">
    <div class="col-md-6"><input class="form-control" name="name" placeholder="Room name" required></div>
    <div class="col-md-4"><input class="form-control" name="capacity" type="number" placeholder="Capacity" required></div>
    <div class="col-md-2"><button class="btn btn-primary w-100" type="submit">Add</button></div>
</form>

<div class="table-responsive">
    <table class="table table-striped align-middle">
        <thead><tr><th>Name</th><th>Capacity</th><th>Actions</th></tr></thead>
        <tbody>
            {% for room in rooms %}
                <tr>
                    <form method="post" action="{{ url_for('admin.edit_room', id=room.id) }}">
                        <td><input class="form-control" name="name" value="{{ room.name }}" required></td>
                        <td><input class="form-control" name="capacity" type="number" value="{{ room.capacity }}" required></td>
                        <td class="d-flex gap-2">
                            <button class="btn btn-sm btn-outline-primary" type="submit">Save</button>
                    </form>
                            <form method="post" action="{{ url_for('admin.delete_room', id=room.id) }}">
                                <button class="btn btn-sm btn-outline-danger" type="submit">Delete</button>
                            </form>
                        </td>
                </tr>
            {% else %}
                <tr><td colspan="3" class="text-muted">No rooms found.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
